# Rendered into /etc/nginx/sites-available/fairtrade by deploy.sh.
# @WEB_ROOT@ is replaced with the absolute path to the built dist/ folder.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 127.0.0.1:8080;    # Tor hidden service maps to this loopback port

    server_name _;
    root @WEB_ROOT@;
    index index.html;

    # Tor / privacy hardening
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache hashed assets
    location ^~ /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every route resolves to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    location ~ /\.(?!well-known) { deny all; }
}