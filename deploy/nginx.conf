# ----------------------------------------------------------------------------
# Nginx site for Fair Trade.
#   :80   — LAN + localhost
#   :8080 — loopback only, fronted by Tor hidden service
# Both blocks reverse-proxy to the Node server on 127.0.0.1:3000.
# ----------------------------------------------------------------------------

upstream fairtrade_app {
    server 127.0.0.1:3000;
    keepalive 16;
}

# Hardened header set, reused in both server blocks
map $sent_http_content_type $fairtrade_csp {
    default "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' data:; frame-ancestors 'none'";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 2m;
    server_tokens off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml font/woff2;
    gzip_vary on;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "DENY"    always;
    add_header Referrer-Policy         "no-referrer" always;
    add_header Content-Security-Policy $fairtrade_csp always;

    location / {
        proxy_pass         http://fairtrade_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}

server {
    listen 127.0.0.1:8080;
    server_name _;

    client_max_body_size 2m;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "DENY"    always;
    add_header Referrer-Policy         "no-referrer" always;
    add_header Content-Security-Policy $fairtrade_csp always;

    location / {
        proxy_pass         http://fairtrade_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
    }
}